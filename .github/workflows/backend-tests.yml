name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  test:
    name: Jest + Supertest (Node 20)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: campus_lost_found_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/campus_lost_found_test
      TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/campus_lost_found_test
      JWT_SECRET: ci_test_jwt_secret_do_not_use_in_production
      JWT_EXPIRES_IN: 1d
      ALLOWED_EMAIL_DOMAINS: eleve.isep.fr,isep.fr
      CLIENT_ORIGIN: http://localhost:5173
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE_MB: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Pas de cache ici car package-lock.json n'est pas commité
          # Le cache sera actif dès qu'un package-lock.json sera présent

      - name: Install dependencies (generates package-lock.json)
        working-directory: server
        run: npm install

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Run database migrations
        working-directory: server
        run: npx prisma migrate deploy

      - name: Seed reference data (categories & locations)
        working-directory: server
        run: node prisma/seed.js

      - name: Run tests with coverage
        working-directory: server
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 7
